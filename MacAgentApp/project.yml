name: MacAgent
options:
  bundleIdPrefix: com.macagent
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  # Keep Xcode DerivedData inside MacAgentApp/ (avoids corrupted global DerivedData)
  # Applied via WorkspaceSettings.xcsettings after generate.
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.macagent.app
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_ALLOWED: "NO"
    ENABLE_HARDENED_RUNTIME: "NO"
targets:
  MacAgent:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - sdk: Carbon.framework
      - sdk: ApplicationServices.framework
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_NAME: MacAgent
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: MacAgent
        CFBundleDisplayName: MacAgent
        CFBundleIdentifier: com.macagent.app
        CFBundleShortVersionString: "0.5.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSHighResolutionCapable: true
